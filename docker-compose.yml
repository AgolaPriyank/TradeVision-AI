version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tradevision
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: tradevision_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trade_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trade_network

  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://tradevision:supersecretpassword@db:5432/tradevision_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey-override-this-in-prod
    depends_on:
      - db
      - redis
    networks:
      - trade_network

  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: ../deployment/docker/ml-engine.Dockerfile
    ports:
      - "8001:8001"
    networks:
      - trade_network
    # Exposing volume for ML models storage between training pipelines and API
    volumes:
      - ml_models_data:/app/models_store

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    networks:
      - trade_network

volumes:
  postgres_data:
  ml_models_data:

networks:
  trade_network:
    driver: bridge
