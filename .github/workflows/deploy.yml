name: TradeVision CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install Backend Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Docker Images
      run: |
        docker-compose build
        
    # Example deployment step (Cloud run, AWS ECS, K8s apply...)
    - name: Push to Registry
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "Pushing images to ACR/ECR..."
        # docker push myregistry.azurecr.io/tradevision/backend:latest
