apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradevision-backend
  labels:
    app: tradevision-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tradevision-backend
  template:
    metadata:
      labels:
        app: tradevision-backend
    spec:
      containers:
      - name: backend
        image: tradevision/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: tradevision-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradevision-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tradevision-frontend
  template:
    metadata:
      labels:
        app: tradevision-frontend
    spec:
      containers:
      - name: frontend
        image: tradevision/frontend:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: tradevision-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
